version: "3.8"
services:
  mydb:
    image: mysql:8.4
    container_name: "mydb"
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - ./../../server/mysql/conf:/etc/mysql
      - ./../../server/mysql/data:/var/lib/mysql
      - ./../../server/mysql/log:/var/log/mysql
      - ./../../server/mysqlback:/var/lib/mysqlback
      - /etc/localtime:/etc/localtime:ro
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    # MySQL 8.4 默认使用新的认证插件，如需兼容老客户端可加入 command
    # command: --default-authentication-plugin=mysql_native_password

  myredis:
    image: redis:7.4
    container_name: "myredis"
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./../../server/redis/data:/data
      - ./../../server/redis/redis.conf:/etc/redis/redis.conf
      - /etc/localtime:/etc/localtime:ro
    command: ["redis-server", "/etc/redis/redis.conf"]

  myphp:
    image: php:8.4-fpm
    container_name: "myphp"
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./../../server/www:/var/www/html
      - ./../../server/php/php.ini:/usr/local/etc/php/php.ini
      - ./../../server/php/php-fpm.conf:/usr/local/etc/php-fpm.conf
      - ./../../server/php/php-fpm.d:/usr/local/etc/php-fpm.d
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - mydb
      - myredis

  mynginx:
    image: nginx:latest
    container_name: "mynginx"
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - myphp
    volumes:
      - ./../../server/www:/usr/share/nginx/html
      - ./../../server/nginx:/etc/nginx
      - ./../../server/logs/nginx.logs:/var/log/nginx
      - /etc/localtime:/etc/localtime:ro